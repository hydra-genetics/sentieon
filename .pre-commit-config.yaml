default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: local
    hooks:
      - id: snakefmt
        name: snakefmt
        entry: snakefmt --check --config .github/linters/.snakefmt.toml
        language: system
        files: (\.smk$|^Snakefile)
        stages: [pre-commit]
      - id: pycodestyle
        name: pycodestyle
        entry: pycodestyle --max-line-length=130 --statistics
        language: system
        files: workflow/scripts/.*\.py$
        stages: [pre-commit]
      - id: snakemake-lint
        name: snakemake lint
        entry: bash -c 'cd .tests/integration && snakemake --lint -s ../../workflow/Snakefile --configfiles config.yaml'
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: snakemake-dry-run
        name: snakemake dry-run
        entry: bash -c 'cd .tests/integration && snakemake -n -s ../../workflow/Snakefile --configfiles config.yaml'
        language: system
        pass_filenames: false
        stages: [pre-push]
